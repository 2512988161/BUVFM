meta:
  dtype: bfloat16
  eval_freq: 100
  load_checkpoint: true
  read_checkpoint: "configs/{model}/{model}.pt"
  save_every_freq: 1
  seed: 239
  use_sdpa: true


model:
  model_name: vit_giant_xformers
  pred_depth: 12
  pred_embed_dim: 384
  pred_num_heads: 12
  uniform_power: true
  use_activation_checkpointing: true
  use_mask_tokens: true
  use_rope: true
  zero_init_mask_tokens: true


optimization:
  ema:
  - 0.99925
  - 0.99925
  epochs: 200
  final_lr: 0.00002
  final_weight_decay: 0.04
  ipe: 3964
  ipe_scale: 1.25
  lr: 0.00002
  start_lr: 0.000004
  warmup: 10
  weight_decay: 0.04