app: vjepa
nodes: 1               
tasks_per_node: 4      
cpus_per_task: 16
mem_per_gpu: 90G
folder: outputs/{model}/pretrain


data:
  dataset_type: VideoDataset
  datasets:
    - configs/{model}/pretrain.csv
  datasets_weights:
    - 1.0
  batch_size: 32
  crop_size: 256
  patch_size: 16
  dataset_fpcs:
    - 16
  tubelet_size: 2
  fps: 8
  num_workers: 8
  persistent_workers: true
  pin_mem: true


data_aug:
